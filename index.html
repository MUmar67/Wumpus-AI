<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wumpus AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #050508;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 1rem;
    overflow: hidden;
  }

  .sr-only {
    position: absolute;
    width: 1px; height: 1px;
    padding: 0; margin: -1px;
    overflow: hidden;
    clip: rect(0, 0, 0, 0);
    white-space: nowrap;
    border-width: 0;
  }

  .zoro-root {
    background: #0a0a12;
    width: 100%;
    max-width: 900px; /* Slightly wider to accommodate side-by-side */
    height: 94vh;        
    max-height: 720px;   
    font-family: 'Share Tech Mono', monospace;
    position: relative;
    border-radius: 12px;
    color: #c0c8d8;
    display: flex;
    flex-direction: column;
    box-shadow: 0 10px 40px rgba(0,255,160,0.05);
    overflow: hidden;    
  }

  .scanlines {
    position: absolute; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,180,0.015) 2px, rgba(0,255,180,0.015) 4px);
    pointer-events: none; z-index: 0;
  }

  .grid-bg {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,255,160,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,160,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none; z-index: 0;
  }

  .content { 
    position: relative; 
    z-index: 2; 
    padding: 1rem 1.5rem; 
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .header { text-align: center; margin-bottom: 0.5rem; flex-shrink: 0; }

  .agent-badge {
    display: inline-block;
    background: rgba(0,255,160,0.08);
    border: 1px solid rgba(0,255,160,0.3);
    color: #00ffa0;
    font-size: 10px;
    letter-spacing: 3px;
    padding: 3px 12px;
    border-radius: 2px;
    margin-bottom: 6px;
    animation: badge-pulse 2.5s ease-in-out infinite;
  }

  @keyframes badge-pulse {
    0%, 100% { opacity: 0.7; box-shadow: 0 0 6px rgba(0,255,160,0.2); }
    50% { opacity: 1; box-shadow: 0 0 16px rgba(0,255,160,0.5); }
  }

  .main-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 2rem; 
    font-weight: 900;
    letter-spacing: 6px;
    color: #e0eaff;
    text-shadow: 0 0 30px rgba(100,160,255,0.4);
    animation: title-flicker 6s ease-in-out infinite;
  }

  @keyframes title-flicker {
    0%, 90%, 100% { opacity: 1; }
    92% { opacity: 0.85; }
    94% { opacity: 1; }
    96% { opacity: 0.9; }
  }

  .title-accent {
    color: #00ffa0;
    text-shadow: 0 0 20px rgba(0,255,160,0.6);
  }

  .subtitle {
    font-size: 10px;
    letter-spacing: 4px;
    color: #5a7090;
    margin-top: 2px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 1rem;
    flex-shrink: 0;
  }

  .stat-card {
    background: rgba(255,255,255,0.03);
    border: 0.5px solid rgba(0,255,160,0.15);
    border-top: 1.5px solid rgba(0,255,160,0.4);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: default;
  }
  .stat-label { font-size: 9px; letter-spacing: 2px; color: #445566; margin-bottom: 2px; }
  .stat-value {
    font-family: 'Orbitron', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: #00ffa0;
  }
  .stat-unit { font-size: 9px; color: #445566; margin-left: 4px; }

  .section-label {
    font-size: 9px; letter-spacing: 3px; color: #445566;
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
    flex-shrink: 0;
    width: 100%;
  }
  .section-label::after {
    content: ''; flex: 1; height: 0.5px; background: rgba(0,255,160,0.12);
  }

  /* --- NEW TWO-COLUMN LAYOUT --- */
  .main-stage {
    display: flex;
    flex-direction: row;
    gap: 2rem;
    flex: 1;
    min-height: 0; /* Crucial for internal scrolling to work */
  }

  .side-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-width: 280px;
  }

  .center-stage {
    flex: 1.3;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  /* ------------------------------ */

  .agent-grid-wrapper {
    display: flex;
    justify-content: center;
    margin-bottom: 1rem;
    flex-shrink: 0;
    width: 100%;
  }

  .agent-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    width: 100%;
    max-width: 320px; 
  }

  .grid-cell {
    aspect-ratio: 1;
    border-radius: 4px;
    display: flex; 
    flex-direction: column;
    align-items: center; 
    justify-content: center;
    font-family: 'Orbitron', sans-serif;
    cursor: pointer;
    border: 0.5px solid rgba(255,255,255,0.06);
    background: rgba(255,255,255,0.03);
    color: #445566;
    transition: all 0.25s ease;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .cell-coord {
    position: absolute;
    top: 3px; left: 4px;
    font-size: 8px;
    opacity: 0.4;
    font-family: 'Share Tech Mono', monospace;
  }
  
  .cell-main {
    font-size: 11px;
    font-weight: bold;
    z-index: 1;
    letter-spacing: 1px;
  }

  .grid-cell[data-percept]::after {
    content: attr(data-percept);
    position: absolute;
    bottom: 2px;
    left: 0;
    width: 100%;
    text-align: center;
    font-size: 8px;
    font-family: 'Share Tech Mono', monospace;
    font-weight: bold;
    color: #ffa040; 
    letter-spacing: 1px;
    pointer-events: none;
    animation: percept-flash 1.2s ease-in-out infinite alternate;
  }
  @keyframes percept-flash {
    from { opacity: 0.6; text-shadow: 0 0 2px rgba(255,160,64,0.4); }
    to { opacity: 1; text-shadow: 0 0 6px rgba(255,160,64,0.8); }
  }

  .grid-cell::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at center, rgba(0,255,160,0.15), transparent 70%);
    opacity: 0; transition: opacity 0.3s;
  }
  .grid-cell:hover::before { opacity: 1; }
  .grid-cell.visited {
    background: rgba(0,255,160,0.1);
    border-color: rgba(0,255,160,0.4);
    animation: cell-activate 0.4s ease;
  }
  .grid-cell.start {
    background: rgba(100,160,255,0.12);
    border-color: rgba(100,160,255,0.5);
  }
  .grid-cell.confirmed-hazard {
    background: rgba(255, 60, 60, 0.1);
    border-color: rgba(255, 60, 60, 0.6);
    color: #ff5050;
    box-shadow: inset 0 0 10px rgba(255, 60, 60, 0.1);
  }
  .grid-cell.hazard {
    background: rgba(255,80,80,0.12);
    border-color: rgba(255,80,80,0.4);
  }

  @keyframes cell-activate {
    0% { transform: scale(0.9); opacity: 0.5; }
    60% { transform: scale(1.06); }
    100% { transform: scale(1); opacity: 1; }
  }

  .controls-wrapper {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 320px;
  }

  .controls-row {
    display: flex; 
    gap: 10px; 
    justify-content: space-between;
  }

  .zoro-btn {
    flex: 1;
    background: transparent;
    border: 0.5px solid rgba(0,255,160,0.3);
    color: #00ffa0;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    font-weight: bold;
    letter-spacing: 2px;
    padding: 8px 0;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
  }
  .zoro-btn:hover {
    background: rgba(0,255,160,0.1);
    border-color: rgba(0,255,160,0.6);
    box-shadow: 0 0 12px rgba(0,255,160,0.2);
    transform: translateY(-1px);
  }
  .zoro-btn:active { transform: scale(0.97); }

  .percept-display {
    background: rgba(0,0,0,0.3);
    border: 0.5px solid rgba(255,255,255,0.06);
    border-radius: 2px;
    padding: 8px 10px;
    font-size: 10px;
    color: #445566;
    letter-spacing: 1px;
    text-align: center;
  }
  .percept-display span { color: #6499ff; }

  /* Log panel styling updated to fill left column */
  .log-panel {
    background: rgba(0,0,0,0.4);
    border: 0.5px solid rgba(0,255,160,0.1);
    border-radius: 4px;
    padding: 6px 10px;
    flex: 1; 
    overflow-y: auto;
    font-size: 10px;
    line-height: 1.6;
  }
  .log-panel::-webkit-scrollbar { width: 3px; }
  .log-panel::-webkit-scrollbar-thumb { background: rgba(0,255,160,0.2); }
  .log-entry { animation: log-in 0.3s ease; }
  @keyframes log-in {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .log-ts { color: #334455; }
  .log-ok { color: #00ffa0; }
  .log-warn { color: #ff5050; }
  .log-info { color: #6499ff; }

  .robot-face {
    width: 32px; height: 32px;
    margin: 0 auto 4px;
    position: relative;
  }
  .robot-eye {
    width: 8px; height: 8px;
    background: #00ffa0;
    border-radius: 2px;
    display: inline-block;
    margin: 0 3px;
    animation: blink 4s ease-in-out infinite;
  }
  .robot-eye.right { animation-delay: 0.15s; }
  @keyframes blink {
    0%, 90%, 100% { transform: scaleY(1); }
    95% { transform: scaleY(0.1); }
  }
  .robot-mouth {
    width: 20px; height: 2px;
    background: rgba(0,255,160,0.4);
    border-radius: 2px;
    margin: 5px auto 0;
    position: relative;
    overflow: hidden;
  }
  .robot-mouth::after {
    content: '';
    position: absolute;
    left: -100%;
    width: 100%; height: 100%;
    background: #00ffa0;
    animation: speak 1.8s linear infinite;
  }
  @keyframes speak {
    0% { left: -100%; }
    100% { left: 100%; }
  }

  .ring-wrap { position: relative; margin-bottom: 0.1rem; }
  .spinning-ring {
    position: absolute;
    width: 140px; height: 140px;
    border: 0.5px solid rgba(0,255,160,0.1);
    border-top-color: rgba(0,255,160,0.4);
    border-radius: 50%;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    animation: spin 8s linear infinite;
    pointer-events: none;
  }
  .spinning-ring.r2 {
    width: 170px; height: 170px;
    border-color: rgba(100,160,255,0.06);
    border-right-color: rgba(100,160,255,0.25);
    animation-duration: 12s;
    animation-direction: reverse;
  }
  @keyframes spin { to { transform: translate(-50%, -50%) rotate(360deg); } }

  .corner { position: absolute; width: 16px; height: 16px; }
  .corner.tl { top: 10px; left: 10px; border-top: 1.5px solid #00ffa0; border-left: 1.5px solid #00ffa0; }
  .corner.tr { top: 10px; right: 10px; border-top: 1.5px solid #00ffa0; border-right: 1.5px solid #00ffa0; }
  .corner.bl { bottom: 10px; left: 10px; border-bottom: 1.5px solid #00ffa0; border-left: 1.5px solid #00ffa0; }
  .corner.br { bottom: 10px; right: 10px; border-bottom: 1.5px solid #00ffa0; border-right: 1.5px solid #00ffa0; }
</style>
</head>
<body>

<h1 class="sr-only">NEXUS-7 Spelunker: Autonomous Cavern Navigation Protocol</h1>

<div class="zoro-root">
  <div class="scanlines"></div>
  <div class="grid-bg"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="header">
      <div class="ring-wrap">
        <div class="spinning-ring"></div>
        <div class="spinning-ring r2"></div>
        <div class="robot-face">
          <div style="display:flex;align-items:center;justify-content:center;padding-top:4px;">
            <div class="robot-eye"></div>
            <div class="robot-eye right"></div>
          </div>
          <div class="robot-mouth"></div>
        </div>
      </div>
      <div class="agent-badge">HUNTER ONLINE</div>
      <div class="main-title"><span class="title-accent">WUMPUS</span> AI</div>
      <div class="subtitle">KNOWLEDGE-BASED CAVE EXPLORATION</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">INFERENCE</div>
        <div class="stat-value" id="s-steps">0<span class="stat-unit">OPS</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">SAFE CELLS</div>
        <div class="stat-value" id="s-safe">0<span class="stat-unit">PTS</span></div>
      </div>
      <div class="stat-card">
        <div class="stat-label">STATUS</div>
        <div class="stat-value" id="s-status" style="font-size:0.85rem;letter-spacing:2px;">READY</div>
      </div>
    </div>

    <div class="main-stage">
      
      <div class="side-panel">
        <div class="section-label">HUNTER LOG</div>
        <div class="log-panel" id="log-panel"></div>
      </div>

      <div class="center-stage">
        <div class="section-label">CAVERN GRID — 4x4</div>
        <div class="agent-grid-wrapper">
          <div class="agent-grid" id="agent-grid"></div>
        </div>
        
        <div class="controls-wrapper">
          <div class="controls-row">
            <button class="zoro-btn" onclick="resetAgent()">RESTART</button>
            <button class="zoro-btn" onclick="autoRun()">AUTO-PLAY</button>
          </div>
          <div class="percept-display">PERCEPTS: <span id="percepts-display">NONE</span></div>
        </div>
      </div>

    </div>
  </div>
</div>

<script>
const ROWS = 4, COLS = 4;
let visited = new Set();
let safeCells = new Set();
let hazards = new Set();
let inferenceSteps = 0;
let agentPos = null;
let autoRunning = false;

function ts() {
  const n = new Date();
  return `[${String(n.getHours()).padStart(2,'0')}:${String(n.getMinutes()).padStart(2,'0')}:${String(n.getSeconds()).padStart(2,'0')}]`;
}

function log(msg, type='ok') {
  const panel = document.getElementById('log-panel');
  const entry = document.createElement('div');
  entry.className = 'log-entry';
  entry.innerHTML = `<span class="log-ts">${ts()}</span> <span class="log-${type}">${msg}</span>`;
  panel.appendChild(entry);
  panel.scrollTop = panel.scrollHeight;
}

function buildGrid() {
  const grid = document.getElementById('agent-grid');
  grid.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      const cell = document.createElement('div');
      cell.className = 'grid-cell';
      cell.id = `cell-${r}-${c}`;
      cell.innerHTML = `<div class="cell-coord">${r},${c}</div><div class="cell-main"></div>`;
      cell.onclick = () => moveAgent(r, c);
      grid.appendChild(cell);
    }
  }
}

function placeHazards() {
  hazards.clear();
  const candidates = [];
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++)
      if (!(r === 0 && c === 0)) candidates.push(`${r},${c}`);
  for (let i = 0; i < 3; i++) {
    const idx = Math.floor(Math.random() * candidates.length);
    hazards.add(candidates.splice(idx, 1)[0]);
  }
}

function updateStats() {
  document.getElementById('s-steps').innerHTML = `${inferenceSteps}<span class="stat-unit">OPS</span>`;
  document.getElementById('s-safe').innerHTML = `${safeCells.size}<span class="stat-unit">PTS</span>`;
}

function getCellEl(r, c) {
  return document.getElementById(`cell-${r}-${c}`);
}

function computeSafeAndHazards(r, c) {
  const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
  neighbors.forEach(([nr, nc]) => {
    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
      const key = `${nr},${nc}`;
      if (!hazards.has(key)) {
        if (!safeCells.has(key) && !visited.has(key)) {
          safeCells.add(key);
          const el = getCellEl(nr, nc);
          if (el && !el.classList.contains('visited')) el.classList.add('visited');
        }
      } else {
        const el = getCellEl(nr, nc);
        if (el && !el.classList.contains('confirmed-hazard')) {
          el.classList.add('confirmed-hazard');
          const main = el.querySelector('.cell-main');
          if (main) {
            main.textContent = 'PIT';
            main.style.color = '#ff5050';
          }
          log(`Hazard confirmed at (${nr},${nc})`, 'warn');
        }
      }
    }
  });
}

function getPercepts(r, c) {
  const percepts = [];
  const neighbors = [[r-1,c],[r+1,c],[r,c-1],[r,c+1]];
  let nearHazard = false;
  neighbors.forEach(([nr,nc]) => {
    if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS) {
      if (hazards.has(`${nr},${nc}`)) nearHazard = true;
    }
  });
  if (nearHazard) percepts.push('BREEZE');
  if (r === ROWS - 1 && c === COLS - 1) percepts.push('GOLD');
  return percepts;
}

function moveAgent(r, c) {
  const key = `${r},${c}`;
  
  if (agentPos) {
    const [pr, pc] = agentPos;
    const prevEl = getCellEl(pr, pc);
    if (prevEl) {
      prevEl.classList.remove('start');
      prevEl.classList.add('visited');
      const pMain = prevEl.querySelector('.cell-main');
      if (pMain) {
        pMain.textContent = 'SAFE'; 
        pMain.style.color = '#00ffa0';
      }
    }
  }

  inferenceSteps += Math.floor(Math.random() * 3) + 1;

  if (hazards.has(key)) {
    const el = getCellEl(r, c);
    el.classList.add('hazard');
    const main = el.querySelector('.cell-main');
    if (main) { main.textContent = 'DEAD'; main.style.color = '#000'; }
    log(`PIT/WUMPUS at (${r},${c}) — hunter terminated`, 'warn');
    document.getElementById('s-status').innerHTML = '<span style="color:#ff5050">DEAD</span>';
    document.getElementById('percepts-display').textContent = 'TERMINATED';
    updateStats();
    autoRunning = false;
    return;
  }

  agentPos = [r, c];
  visited.add(key);
  const el = getCellEl(r, c);
  
  el.classList.remove('confirmed-hazard'); 
  el.className = 'grid-cell start';
  
  const main = el.querySelector('.cell-main');
  if (main) { main.textContent = 'HNT'; main.style.color = '#6499ff'; }

  computeSafeAndHazards(r, c);
  const percepts = getPercepts(r, c);
  
  let visualPercepts = [];
  if (percepts.includes('BREEZE')) visualPercepts.push('BREEZE');
  if (percepts.includes('GOLD')) visualPercepts.push('GOLD');
  
  if (visualPercepts.length > 0) {
    el.setAttribute('data-percept', visualPercepts.join(' + '));
  }

  updateStats();
  document.getElementById('percepts-display').textContent = percepts.length ? percepts.join(' + ') : 'NONE';
  document.getElementById('s-status').innerHTML = percepts.includes('GOLD') ? '<span style="color:#00ffa0">GOLD FOUND</span>' : 'ACTIVE';
  log(`Moved to (${r},${c}) — percepts: ${percepts.length ? percepts.join(', ') : 'none'}`, percepts.includes('BREEZE') ? 'warn' : 'info');

  if (percepts.includes('GOLD')) {
    log('GOLD reached — mission complete', 'ok');
    autoRunning = false;
  }
}

function resetAgent() {
  visited.clear(); safeCells.clear(); hazards.clear();
  inferenceSteps = 0; agentPos = null; autoRunning = false;
  document.getElementById('percepts-display').textContent = 'NONE';
  document.getElementById('s-status').textContent = 'READY';
  updateStats();
  buildGrid();
  placeHazards();
  log('System reinitialised — new cavern loaded', 'ok');
  setTimeout(() => moveAgent(0, 0), 300);
}

function autoRun() {
  if (autoRunning) { autoRunning = false; return; }
  autoRunning = true;
  log('Auto-play engaged — navigating safe cells...', 'info');
  function step() {
    if (!autoRunning || !agentPos) return;
    const safe = [...safeCells].filter(k => !visited.has(k));
    if (!safe.length) { autoRunning = false; log('No safe frontier — halted', 'warn'); return; }
    const [nr, nc] = safe[Math.floor(Math.random() * safe.length)].split(',').map(Number);
    moveAgent(nr, nc);
    if (autoRunning) setTimeout(step, 900);
  }
  setTimeout(step, 900);
}

buildGrid();
placeHazards();
log('Wumpus AI Hunter v1.5 — system online', 'ok');
log('Cavern generated: 4x4 grid with 3 pits/wumpuses', 'info');
setTimeout(() => moveAgent(0, 0), 400);
</script>
</body>
</html>
